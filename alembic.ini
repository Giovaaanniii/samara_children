# Alembic — миграции схемы БД. URL подставляется в alembic/env.py из переменных окружения (.env).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Заглушка; реальное значение задаётся в env.py через backend.config.settings
sqlalchemy.url = postgresql+asyncpg://samara:samara@localhost:5432/samara_children

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
